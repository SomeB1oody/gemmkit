name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Default build + tests, then the same suite with every element-type family on (f16/bf16, i8, complex)
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust: stable
            target: x86_64-unknown-linux-gnu
    name: test/${{ matrix.target }}/${{ matrix.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --no-fail-fast
      - name: test with all element-type features (f16/bf16, i8, complex)
        run: cargo test --workspace --all-features --no-fail-fast
      - name: test with the parallel feature off (incl. element-type families)
        run: cargo test -p gemmkit --no-default-features --features std,half,int8,complex --no-fail-fast
      - name: build with the std feature off (exercise not(feature="std") fallbacks)
        run: cargo build -p gemmkit --no-default-features
      - name: build with std off + element-type families
        run: cargo build -p gemmkit --no-default-features --features half,int8,complex
      - name: build with std off + epilogue only (fused f32/f64, no element types)
        run: cargo build -p gemmkit --no-default-features --features epilogue
      - name: build with std off + element-type families + epilogue
        run: cargo build -p gemmkit --no-default-features --features half,int8,complex,epilogue

  # Force a specific kernel end-to-end via GEMMKIT_REQUIRE_ISA
  kernel:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - isa: scalar
            rust: stable
            target: x86_64-unknown-linux-gnu
          - isa: fma
            rust: stable
            target: x86_64-unknown-linux-gnu
    name: kernel-${{ matrix.isa }}/${{ matrix.target }}/${{ matrix.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: test ${{ matrix.isa }} kernel
        env:
          GEMMKIT_REQUIRE_ISA: ${{ matrix.isa }}
        run: cargo test -p gemmkit --all-features --no-fail-fast

  # Run the test suite under Intel SDE so the AVX-512F kernel is validated
  avx512f_test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust: stable
            target: x86_64-unknown-linux-gnu
    name: avx512f_test/${{ matrix.target }}/${{ matrix.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Set up Intel SDE
        # Sets SDE_PATH to the directory containing the SDE binaries.
        uses: petarpetrovt/setup-sde@v5.0
      - name: Tests under SDE (force + ensure avx512f, all element types)
        run: |
          export PATH="$SDE_PATH:$PATH"
          cargo test -p gemmkit --all-features --release --tests --lib --no-fail-fast
        env:
          # Emulate a CPU with avx512f (Sapphire Rapids)
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER: "sde64 -spr --"
          GEMMKIT_REQUIRE_ISA: avx512f
          # Bound the props_* proptest binaries under SDE emulation; native runs use full case counts
          PROPTEST_CASES: "16"
          # Shrink the deterministic dimension/coefficient sweeps under ~50x SDE emulation;
          # every branch/path class is still covered (native jobs keep the full sweeps)
          GEMMKIT_FAST_TEST: "1"

  # i8 VNNI (`vpdpbusd`) dot kernel
  avx512vnni_test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust: stable
            target: x86_64-unknown-linux-gnu
    name: avx512vnni_test/${{ matrix.target }}/${{ matrix.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Set up Intel SDE
        uses: petarpetrovt/setup-sde@v5.0
      - name: Tests under SDE (force the i8 VNNI dot kernel, all element types)
        run: |
          export PATH="$SDE_PATH:$PATH"
          cargo test -p gemmkit --all-features --release --tests --lib --no-fail-fast
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER: "sde64 -spr --"
          GEMMKIT_REQUIRE_ISA: avx512vnni
          PROPTEST_CASES: "16"
          GEMMKIT_FAST_TEST: "1"

  # bf16 (`vdpbf16ps`) dot kernel
  avx512bf16_test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust: stable
            target: x86_64-unknown-linux-gnu
    name: avx512bf16_test/${{ matrix.target }}/${{ matrix.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Set up Intel SDE
        uses: petarpetrovt/setup-sde@v5.0
      - name: Tests under SDE (force the bf16 dot kernel, all element types)
        run: |
          export PATH="$SDE_PATH:$PATH"
          cargo test -p gemmkit --all-features --release --tests --lib --no-fail-fast
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER: "sde64 -spr --"
          GEMMKIT_REQUIRE_ISA: avx512bf16
          PROPTEST_CASES: "16"
          GEMMKIT_FAST_TEST: "1"

  # 32-bit x86 `cargo check` only (no runner)
  i686_check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rust: stable
            target: i686-unknown-linux-gnu
    name: i686_check/${{ matrix.target }}/${{ matrix.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p gemmkit --target i686-unknown-linux-gnu --all-features

  # no_std targets
  no_std:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust: stable
            target: x86_64-unknown-none
          - rust: stable
            target: aarch64-unknown-none
          - rust: stable
            target: wasm32-unknown-unknown
    name: no_std/${{ matrix.target }}/${{ matrix.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: build no_std (default)
        run: cargo build -p gemmkit --no-default-features --target ${{ matrix.target }}
      - name: build no_std + element-type families (f16/bf16, i8, complex)
        run: cargo build -p gemmkit --no-default-features --features half,int8,complex --target ${{ matrix.target }}

  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rust: stable
            target: x86_64-unknown-linux-gnu
    name: lint/${{ matrix.target }}/${{ matrix.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target }}
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  miri:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rust: nightly
            target: x86_64-unknown-linux-gnu
    name: miri/${{ matrix.target }}/${{ matrix.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target }}
          components: miri
      - name: Miri on the scalar path (all element-type families)
        env:
          MIRIFLAGS: -Zmiri-disable-isolation
        run: cargo miri test -p gemmkit --all-features --test correctness miri_scalar_path
      - name: Miri on the complex raw negative-stride entry
        env:
          MIRIFLAGS: -Zmiri-disable-isolation
        run: cargo miri test -p gemmkit --all-features --test correctness cplx_unchecked_negative_strides

  msrv:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rust: 1.89.0
            target: x86_64-unknown-linux-gnu
    name: msrv/${{ matrix.target }}/${{ matrix.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-features

  # build + run the whole suite natively on an arm64 runner
  kernel-neon:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust: stable
            target: aarch64-apple-darwin
    name: kernel-neon/${{ matrix.target }}/${{ matrix.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features --no-fail-fast
      - name: force the neon kernel (all element-type families)
        env:
          GEMMKIT_REQUIRE_ISA: neon
        run: cargo test -p gemmkit --all-features --no-fail-fast

  # WebAssembly `simd128` backend
  wasm_simd128:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust: stable
            target: wasm32-wasip1
    name: wasm_simd128/${{ matrix.target }}/${{ matrix.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install wasmtime (test runner)
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"
      - name: Hygiene — scalar fallback (no simd128), element families, -D warnings
        env:
          RUSTFLAGS: -D warnings
        run: cargo build -p gemmkit --target wasm32-wasip1 --no-default-features --features std,half,int8,complex --tests
      - name: Hygiene — +simd128, element families, -D warnings
        env:
          RUSTFLAGS: -C target-feature=+simd128 -D warnings
        run: cargo build -p gemmkit --target wasm32-wasip1 --no-default-features --features std,half,int8,complex --tests
      - name: Correctness under wasmtime — +simd128, element families (pin simd128 to assert the SIMD path is live)
        env:
          RUSTFLAGS: -C target-feature=+simd128
          CARGO_TARGET_WASM32_WASIP1_RUNNER: wasmtime --env GEMMKIT_REQUIRE_ISA=simd128
        run: cargo test -p gemmkit --target wasm32-wasip1 --no-default-features --features std,half,int8,complex --test correctness --test simd_conformance --no-fail-fast
      - name: Guarded parallel — builds + degrades to serial under wasmtime (baseline wasip1 has no threads)
        env:
          RUSTFLAGS: -C target-feature=+simd128 -D warnings
          CARGO_TARGET_WASM32_WASIP1_RUNNER: wasmtime
        run: |
          cargo build -p gemmkit --target wasm32-wasip1 --no-default-features --features std,parallel,half,int8,complex --tests
          cargo test -p gemmkit --target wasm32-wasip1 --no-default-features --features std,parallel,half,int8,complex --test correctness parallel_equals_serial --no-fail-fast

  # Threaded wasm: `wasm32-wasip1-threads` + `wasm_threads` feature
  wasm_simd128_threads:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust: stable
            target: wasm32-wasip1-threads
    name: wasm_simd128_threads/${{ matrix.target }}/${{ matrix.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install wasmtime v46 (last release with wasi-threads)
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash -s -- --version v46.0.1
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"
      - name: Hygiene — threaded build (+wasm_threads), -D warnings
        env:
          RUSTFLAGS: -C target-feature=+simd128 -D warnings
        run: cargo build -p gemmkit --target wasm32-wasip1-threads --no-default-features --features std,parallel,wasm_threads,half,int8,complex --tests
      - name: Correctness under real 8-way threads (pin simd128 to assert the SIMD path is live)
        env:
          RUSTFLAGS: -C target-feature=+simd128
          CARGO_TARGET_WASM32_WASIP1_THREADS_RUNNER: "wasmtime -W threads=y -W shared-memory=y -S threads=y --env GEMMKIT_REQUIRE_ISA=simd128"
        run: cargo test -p gemmkit --target wasm32-wasip1-threads --no-default-features --features std,parallel,wasm_threads,half,int8,complex --test correctness --no-fail-fast

  # Code coverage (cargo-llvm-cov, scripts/coverage.sh). Report-only: no lines% floor
  # until a coverage triage establishes the coverable baseline.
  coverage:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust: stable
            target: x86_64-unknown-linux-gnu
    name: coverage/${{ matrix.target }}/${{ matrix.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target }}
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      # Pinned ISA list: the ubuntu-latest pool is heterogeneous (some machines expose
      # avx512f, most don't), so probing cpuinfo would make the coverage % swing
      # run-to-run. avx512f/vnni/bf16 coverage comes from local runs of the same script.
      - name: Coverage (scalar + fma, report-only)
        env:
          COVERAGE_ISAS: scalar fma
        run: scripts/coverage.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-x86_64
          path: |
            coverage/lcov-x86_64.info
            coverage/meta-x86_64.txt
            coverage/html-x86_64
