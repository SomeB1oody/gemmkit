[package]
name = "gemmkit-ndarray"
description = "ndarray adapter for the gemmkit GEMM engine"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
keywords.workspace = true
categories.workspace = true
readme = "README.md"

[features]
default = ["parallel"]
parallel = ["gemmkit/parallel"]
# Forward gemmkit's `half`: `f16`/`bf16` are `GemmScalar` (f32-accumulate), so the
# generic adapter (`gemm`/`gemm_with`/`dot`) serves them as-is. (gemmkit's `complex`/
# `int8` are not forwarded here — they aren't `GemmScalar` and need dedicated adapter
# fns, not a passthrough.)
half = ["gemmkit/half"]
# Complex GEMM over `Complex<f32>`/`Complex<f64>` with optional conjugation. Not
# `GemmScalar`, so it needs dedicated adapter fns (`dot_cplx` / `gemm_cplx[_with]`),
# which this feature compiles in alongside forwarding `gemmkit/complex`.
complex = ["gemmkit/complex"]

[dependencies]
gemmkit = { path = "../gemmkit", version = "0.1.0", default-features = false, features = ["std"] }
ndarray = "0.17"

[dev-dependencies]
ndarray = { version = "0.17", features = ["approx"] }
approx = "0.5"
