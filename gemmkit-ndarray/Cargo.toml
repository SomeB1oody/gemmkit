[package]
name = "gemmkit-ndarray"
description = "ndarray adapter for the gemmkit GEMM engine"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
keywords.workspace = true
categories.workspace = true
readme = "README.md"

[features]
default = ["parallel"]
parallel = ["gemmkit/parallel"]
# Forward gemmkit's `half` feature so the generic adapter (`gemm`/`gemm_with`/`dot`)
# also serves `f16`/`bf16` — they are `GemmScalar` (mixed-precision, f32-accumulate),
# so the existing generic surface covers them once the family is compiled in. (gemmkit's
# `complex`/`int8` are *not* forwarded: complex needs the conj entry and i8 is i8->i32
# heterogeneous, neither of which the homogeneous `gemm<T: GemmScalar>` surface can
# express — they would need dedicated adapter functions, not a passthrough.)
half = ["gemmkit/half"]
# Complex GEMM over `Complex<f32>`/`Complex<f64>`, with optional conjugation. Unlike
# `half`, this needs dedicated adapter fns (`dot_cplx` / `gemm_cplx[_with]`) — complex
# is not `GemmScalar` and the conj flags don't fit the homogeneous surface — so it
# forwards `gemmkit/complex` *and* compiles those fns in.
complex = ["gemmkit/complex"]

[dependencies]
gemmkit = { path = "../gemmkit", version = "0.1.0", default-features = false, features = ["std"] }
ndarray = "0.17"

[dev-dependencies]
ndarray = { version = "0.17", features = ["approx"] }
approx = "0.5"
